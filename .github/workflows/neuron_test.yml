name: Basic Test
on: pull_request

permissions:
  contents: read
  actions: write
  checks: write
  pull-requests: write

jobs:
  test:
    name: Basic Test
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v2
      
      - name: Simple Test
        run: |
          echo "Hello from runner"
          echo "Current directory: $(pwd)"
          echo "Files: $(ls -la)"
          
      - name: Report Status
        run: |
          echo "::set-output name=status::success"
          echo "Test completed successfully"