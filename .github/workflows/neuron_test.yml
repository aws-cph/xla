# .github/workflows/neuron_test.yml
name: Neuron Tests
on: 
  pull_request:
    branches:
      - master

env:
  ACTIONS_RUNNER_DEBUG: true
  ACTIONS_STEP_DEBUG: true

jobs:
  neuron-test:  # give it a specific job ID
    name: Neuron Test Suite  # give it a clear name
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v2
        with:
          fetch-depth: 1
      
      - name: Debug Environment
        run: |
          echo "GitHub ref: ${{ github.ref }}"
          echo "Event name: ${{ github.event_name }}"
          echo "SHA: ${{ github.sha }}"
          pwd
          ls -la

      - name: Run Tests in Neuron Container
        run: |
          docker run --rm \
            -v $(pwd):/workspace \
            public.ecr.aws/neuron/pytorch-inference-neuronx:2.6.0-neuronx-py310-sdk2.23.0-ubuntu22.04 \
            /bin/bash -c "cd /workspace && python3 test/pjrt/test_runtime.py"